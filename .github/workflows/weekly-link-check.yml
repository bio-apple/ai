name: Weekly Link Check

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  external-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps and build (Astro)
        run: ASTRO_TELEMETRY_DISABLED=1 npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: python -m pip install -r requirements.txt

      - name: Build site (Astro)
        run: ASTRO_TELEMETRY_DISABLED=1 npm run build

      - name: Check external links
        run: DIST=dist python scripts/check_external_links.py
        continue-on-error: true
