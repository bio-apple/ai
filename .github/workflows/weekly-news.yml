name: Weekly AI News Update

on:
  schedule:
    # 北京时间每周一 06:00（UTC 周日 22:00）
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: python -m pip install pyyaml

      - name: Fetch AI news
        run: python scripts/fetch_ai_news.py

      - name: Refresh GitHub Stars for OSS projects
        run: python scripts/fetch_oss_stars.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-news.json content/news/daily-ai-news.md data/oss-projects.json oss-projects.json
          if git diff --staged --quiet; then
            echo "No news updates this week"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: weekly AI news and OSS stars $DATE"
          git push
