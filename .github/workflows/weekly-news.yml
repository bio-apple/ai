name: Weekly AI News Update

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: weekly-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: python -m pip install pyyaml==6.0.3

      - name: Fetch AI news
        id: fetch
        run: python scripts/fetch_ai_news.py

      - name: Refresh GitHub Stars for OSS projects
        run: python scripts/fetch_oss_stars.py

      - name: Report metrics
        if: always() && steps.fetch.outcome == 'success'
        run: python scripts/report_fetch_metrics.py news

      - name: Commit and push
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-news.json content/news/daily-ai-news.md data/oss-projects.json oss-projects.json
          if git diff --staged --quiet; then
            echo "No news updates this week"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: weekly AI news and OSS stars $DATE"
          git push

      - name: Open issue on fetch failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '[ops] Weekly news fetch failed';
            const body = [
              '每周新闻/开源 Star 刷新失败，或新闻条数严重不足。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '<!-- weekly-news-fetch -->',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
