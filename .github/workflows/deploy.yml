name: Deploy

# push main → Lint & Format → Build → Deploy GitHub Pages
# 线上：https://bio-apple.github.io/ai/
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python deps (secret scan)
        run: python3 -m pip install -q jsonschema pyyaml beautifulsoup4

      - name: Secret scan (validate_ci)
        run: python3 scripts/validate_ci.py secrets

      - name: Secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

  build:
    name: Build
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps and build (Astro SSG)
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          CLOUDFLARE_BEACON_TOKEN: ${{ secrets.CLOUDFLARE_BEACON_TOKEN }}
        run: ASTRO_TELEMETRY_DISABLED=1 npm ci && npm run build

      - name: Check dist artifacts
        run: |
          test -f dist/index.html
          test -f dist/recommend-rules.json
          test -f dist/daily-videos.json
          test -f dist/daily-videos.latest.json
          test -f dist/lib/fetch-json.js
          test -f dist/ai-courses.json
          test -f dist/engagement.json
          test -f dist/_headers
          test -f dist/favicon.svg
          test -f dist/og-image.jpg

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install -r requirements.txt

      - name: Validate dist
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
