name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps and build (Astro SSG)
        run: ASTRO_TELEMETRY_DISABLED=1 npm ci && npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Validate dist / JSON / links
        run: DIST=dist python scripts/validate_ci.py

      - name: FastAPI API smoke
        run: PYTHONPATH=. python scripts/smoke_api.py

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: npm run test:e2e
