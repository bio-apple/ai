name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Prettier check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

  validate:
    name: Build · Test · Validate
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps and build (Astro SSG)
        env:
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          CLARITY_PROJECT_ID: ${{ secrets.CLARITY_PROJECT_ID }}
          UMAMI_SCRIPT_URL: ${{ secrets.UMAMI_SCRIPT_URL }}
          UMAMI_WEBSITE_ID: ${{ secrets.UMAMI_WEBSITE_ID }}
          CLOUDFLARE_BEACON_TOKEN: ${{ secrets.CLOUDFLARE_BEACON_TOKEN }}
        run: ASTRO_TELEMETRY_DISABLED=1 npm ci && npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Upload dist preview (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v6
        with:
          name: dist-preview
          path: dist
          retention-days: 7

      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install -r requirements.txt

      - name: Validate data JSON
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py data

      - name: Validate tool relations
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py tool-relations

      - name: Validate OSS projects
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py oss

      - name: Validate daily videos
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py videos

      - name: Validate AI news
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py news

      - name: Validate AI courses
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py courses

      - name: Validate runtime JSON
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py runtime

      - name: Validate recommend rules
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py recommend

      - name: Validate sitemap and robots
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py sitemap

      - name: Validate search index
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py search

      - name: Validate analytics config
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py analytics

      - name: Validate HTML links
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py links

      - name: FastAPI API smoke
        run: PYTHONPATH=. ${{ steps.setup-python.outputs.python-path }} scripts/smoke_api.py

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: |
          set +e
          npm run test:e2e
          code=$?
          set -e
          ${{ steps.setup-python.outputs.python-path }} scripts/report_e2e_annotations.py playwright-results.json || true
          exit $code

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
            playwright-results.json
          if-no-files-found: ignore
          retention-days: 7
