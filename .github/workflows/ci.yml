name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Build site from data
        run: python scripts/build_site.py

      - name: Validate JSON / sitemap / links
        run: python scripts/validate_ci.py

      - name: FastAPI API smoke
        run: PYTHONPATH=. python scripts/smoke_api.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: npm ci && npx playwright install chromium --with-deps

      - name: E2E smoke tests
        run: npm run test:e2e
