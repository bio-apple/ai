name: Daily AI News Update

on:
  # 定时由 daily-refresh.yml（北京 00:00 串行）统一触发；本文件仅保留手动
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps
        run: |
          python -m pip install pyyaml==6.0.3
          ASTRO_TELEMETRY_DISABLED=1 npm ci

      - name: Fetch AI news
        id: fetch
        run: python scripts/fetch_ai_news.py

      - name: Report metrics
        id: metrics
        if: steps.fetch.outcome == 'success'
        run: python scripts/report_fetch_metrics.py news

      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx prettier --write ai-news.json
          git add ai-news.json
          if git diff --staged --quiet; then
            echo "No news updates today"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI news $DATE"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            let lastErr;
            for (let i = 1; i <= 4; i++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                });
                console.log(`Dispatched deploy.yml (attempt ${i})`);
                return;
              } catch (err) {
                lastErr = err;
                console.warn(`Dispatch attempt ${i} failed: ${err.message}`);
                if (i < 4) await sleep(1000 * Math.pow(2, i));
              }
            }
            core.setFailed(`Trigger Pages deploy failed after retries: ${lastErr && lastErr.message}`);

      - name: Open issue on fetch failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[ops] Daily news fetch failed';
            const body = [
              '每日 AI 新闻抓取失败，或新闻条数严重不足。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '处置：Actions → Daily AI News Update → Run workflow。',
              '详见 docs/OPS-RUNBOOK.md',
              '',
              '<!-- daily-news-fetch -->',
            ].join('\n');
            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 30,
              });
              const existing = issues.find(i => i.title === title);
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
              }
            } catch (err) {
              core.warning(`无法创建/更新 Issue（仓库可能关闭了 Issues）: ${err.message}`);
              core.summary.addHeading(title).addRaw(body).write();
            }
