name: Daily OSS Stars Update

on:
  # 定时由 daily-refresh.yml（北京 00:00 串行）统一触发；本文件仅保留手动
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: daily-oss
  cancel-in-progress: false

jobs:
  update-oss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Recollect OSS by AI app (≥50k Top5 + 中文Top1 / app)
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_oss_stars.py

      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/oss-projects.json oss-projects.json
          if git diff --staged --quiet; then
            echo "No OSS updates today"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily OSS recollect $DATE (≥50k Top5 + 中文Top1)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            console.log('Dispatched deploy.yml');

      - name: Open issue on fetch failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[ops] Daily OSS stars fetch failed';
            const body = [
              '每日开源精选重刷失败（按 AI 应用分类 · ≥5万 Top5 + 中文Top1）。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '处置：Actions → Daily OSS Stars Update → Run workflow。',
              '详见 docs/OPS-RUNBOOK.md',
              '',
              '<!-- daily-oss-fetch -->',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
