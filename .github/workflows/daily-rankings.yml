name: Daily AI Rankings Update

on:
  # 定时由 daily-refresh.yml（北京 00:00 串行）统一触发；本文件仅保留手动
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: daily-rankings
  cancel-in-progress: false

jobs:
  update-rankings:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Fetch AI tool rankings (AICPB / LMSYS / AA)
        id: fetch
        run: python scripts/fetch_rankings.py

      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rankings.json
          if git diff --staged --quiet; then
            echo "No rankings updates today"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI rankings $DATE"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            console.log('Dispatched deploy.yml');

      - name: Open issue on fetch failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[ops] Daily rankings fetch failed';
            const body = [
              '每日 AI 工具排行榜抓取失败（任一源失败则整次失败，保留上一版）。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '处置：Actions → Daily AI Rankings Update → Run workflow。',
              '详见 docs/OPS-RUNBOOK.md',
              '',
              '<!-- daily-rankings-fetch -->',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
