name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install deps and build (Astro SSG)
        run: ASTRO_TELEMETRY_DISABLED=1 npm ci && npm run build

      - name: Check dist artifacts
        run: test -f dist/index.html && test -f dist/prompts.json && test -f dist/daily-videos.json

      - uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python deps
        run: ${{ steps.setup-python.outputs.python-path }} -m pip install -r requirements.txt

      - name: Validate dist
        run: DIST=dist ${{ steps.setup-python.outputs.python-path }} scripts/validate_ci.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
