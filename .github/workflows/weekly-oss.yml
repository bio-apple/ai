name: Weekly OSS Stars Update

on:
  schedule:
    # 北京时间每周一 06:00 ≈ UTC 周日 22:00
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

concurrency:
  group: weekly-oss
  cancel-in-progress: false

jobs:
  update-oss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Refresh GitHub Stars for OSS projects
        id: fetch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/fetch_oss_stars.py

      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/oss-projects.json oss-projects.json
          if git diff --staged --quiet; then
            echo "No OSS star updates this week"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: weekly OSS stars $DATE"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main',
            });
            console.log('Dispatched pages.yml');

      - name: Open issue on fetch failure
        if: failure()
        uses: actions/github-script@v8
        with:
          script: |
            const title = '[ops] Weekly OSS stars fetch failed';
            const body = [
              '每周开源 Star 刷新失败。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              '',
              '<!-- weekly-oss-fetch -->',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
