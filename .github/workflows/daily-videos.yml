name: Daily AI Video Update

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "强制重抓今日批次（升级六类结构时使用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write
  actions: write   # 派发 pages.yml 需要；缺此项 Trigger Pages deploy 会 403

concurrency:
  group: daily-videos
  cancel-in-progress: false

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # yt-dlp 抓 YouTube 搜索需要 JS runtime，否则 Actions 上常整类为空
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install yt-dlp
        run: |
          python -m pip install -U "yt-dlp[default]>=2024.8.0" pyyaml==6.0.3
          yt-dlp --version
          node -v

      - name: Fetch daily AI videos
        id: fetch
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/fetch_daily_videos.py $FORCE_FLAG

      - name: Report metrics
        id: metrics
        if: steps.fetch.outcome == 'success'
        run: python scripts/report_fetch_metrics.py videos

      # 关键：只要抓取成功就提交。勿用 success()（会被 metrics/其它步骤误伤）
      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-videos.json video-thumbs/
          if git diff --staged --quiet; then
            echo "No video updates today"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI videos $DATE"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN 的 push 不会连锁触发其它 workflow，需显式派发 Pages
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'pages.yml',
                ref: 'main',
              });
              console.log('Dispatched pages.yml');
            } catch (err) {
              core.setFailed(`Trigger Pages deploy failed: ${err.message}`);
              throw err;
            }

      - name: Open issue on hard failure
        if: steps.fetch.outcome == 'failure' || steps.metrics.outputs.level == '2'
        uses: actions/github-script@v8
        with:
          script: |
            const fetchFailed = '${{ steps.fetch.outcome }}' === 'failure';
            const level = '${{ steps.metrics.outputs.level }}';
            if (!fetchFailed && level !== '2') {
              console.log('Non-severe failure; skip issue');
              return;
            }
            const title = '[ops] Daily video fetch failed';
            const body = [
              fetchFailed
                ? '每日视频抓取步骤失败（脚本异常 / 总条数为 0 / 代码错误）。'
                : '抓取已写入，但最新批次核心内容严重不足（metrics_level=2）。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              `- metrics_level: ${level || 'n/a'}`,
              '',
              '处置：Actions → Daily AI Video Update → Run workflow（force=true）。',
              'YouTube 常空时页面会「回退批次」；B 站有货时应已 commit。',
              '详见 docs/OPS-RUNBOOK.md',
              '',
              '<!-- daily-videos-fetch -->',
            ].join('\n');
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 30,
            });
            const existing = issues.find(i => i.title === title);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
              });
            }
