name: Daily AI Video Update

on:
  # 定时由 daily-refresh.yml（北京 00:00 串行）统一触发；本文件仅保留手动
  workflow_dispatch:
    inputs:
      force:
        description: "强制重抓今日批次（升级八类分桶 / 门槛时使用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write
  issues: write
  actions: write # 派发 deploy.yml 需要；缺此项 Trigger Pages deploy 会 403

concurrency:
  group: daily-videos
  cancel-in-progress: false

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      # yt-dlp 抓 YouTube 搜索需要 JS runtime，否则 Actions 上常整类为空
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install yt-dlp + npm
        run: |
          python -m pip install -U "yt-dlp[default]>=2024.8.0" pyyaml==6.0.3
          yt-dlp --version
          node -v
          ASTRO_TELEMETRY_DISABLED=1 npm ci

      - name: Preflight YouTube credentials
        run: |
          if [ -z "${{ secrets.YOUTUBE_API_KEY }}" ] && [ -z "${{ secrets.YOUTUBE_DATA_API_V3 }}" ]; then
            echo "::warning::未配置 YouTube API Key（YOUTUBE_API_KEY 或 YOUTUBE_DATA_API_V3）。CI 上 yt-dlp 详情常被反爬拦截，YouTube 可能为空；将依赖批次回退。"
          else
            echo "✓ YouTube Data API v3 Key 已配置"
          fi
          if [ -n "${{ secrets.YTDLP_COOKIES_B64 }}" ]; then
            echo "✓ YTDLP_COOKIES_B64 已配置（yt-dlp 备用 cookies）"
          fi

      - name: Prepare optional yt-dlp cookies
        env:
          COOKIES_B64: ${{ secrets.YTDLP_COOKIES_B64 }}
        run: |
          if [ -n "$COOKIES_B64" ]; then
            echo "$COOKIES_B64" | base64 -d > "${RUNNER_TEMP}/youtube_cookies.txt"
            echo "YTDLP_COOKIES_FILE=${RUNNER_TEMP}/youtube_cookies.txt" >> "$GITHUB_ENV"
            echo "✓ yt-dlp cookies 已写入临时文件"
          fi

      - name: Fetch daily AI videos
        id: fetch
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_DATA_API_V3: ${{ secrets.YOUTUBE_DATA_API_V3 }}
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/fetch_daily_videos.py $FORCE_FLAG

      - name: Verify YouTube batch health
        if: steps.fetch.outcome == 'success'
        run: |
          python3 << 'PY'
          import json
          import sys
          from pathlib import Path
          data = json.loads(Path("daily-videos.json").read_text(encoding="utf-8"))
          batch = (data.get("batches") or [None])[0]
          if not batch:
              print("::error::无视频批次")
              sys.exit(1)
          cats = batch.get("categories") or {}
          yt = sum(len((cats.get(k) or {}).get("videos") or []) for k in cats if k.startswith("youtube"))
          bi = sum(len((cats.get(k) or {}).get("videos") or []) for k in cats if k.startswith("bilibili"))
          print(f"YouTube: {yt} · B站: {bi}")
          if yt == 0:
              print("::warning::今日批次 YouTube 仍为空（可能未配置 YOUTUBE_API_KEY 或反爬未绕过）；页面将依赖历史回退。")
          if bi == 0 and yt == 0:
              print("::error::双平台均为空，不应提交")
              sys.exit(1)
          PY

      - name: Report metrics
        id: metrics
        if: steps.fetch.outcome == 'success'
        run: python scripts/report_fetch_metrics.py videos

      # 关键：只要抓取成功就提交。勿用 success()（会被 metrics/其它步骤误伤）
      - name: Commit and push
        id: commit
        if: steps.fetch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npx prettier --write daily-videos.json
          git add daily-videos.json video-thumbs/
          if git diff --staged --quiet; then
            echo "No video updates today"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI videos $DATE"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN 的 push 不会连锁触发其它 workflow，需显式派发 Pages（带重试）
      - name: Trigger Pages deploy
        if: steps.commit.outputs.pushed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            let lastErr;
            for (let i = 1; i <= 4; i++) {
              try {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'deploy.yml',
                  ref: 'main',
                });
                console.log(`Dispatched deploy.yml (attempt ${i})`);
                return;
              } catch (err) {
                lastErr = err;
                console.warn(`Dispatch attempt ${i} failed: ${err.message}`);
                if (i < 4) await sleep(1000 * Math.pow(2, i));
              }
            }
            core.setFailed(`Trigger Pages deploy failed after retries: ${lastErr && lastErr.message}`);

      - name: Open issue on hard failure
        if: steps.fetch.outcome == 'failure' || steps.metrics.outputs.level == '2'
        uses: actions/github-script@v9
        with:
          script: |
            const fetchFailed = '${{ steps.fetch.outcome }}' === 'failure';
            const level = '${{ steps.metrics.outputs.level }}';
            if (!fetchFailed && level !== '2') {
              console.log('Non-severe failure; skip issue');
              return;
            }
            const title = '[ops] Daily video fetch failed';
            const body = [
              fetchFailed
                ? '每日视频抓取步骤失败（脚本异常 / 总条数为 0 / 代码错误）。'
                : '抓取已写入，但最新批次核心内容严重不足（metrics_level=2）。',
              '',
              `- Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`,
              `- metrics_level: ${level || 'n/a'}`,
              '',
              '处置：Actions → Daily AI Video Update → Run workflow（force=true）。',
              '若 YouTube 为空：在 Settings → Secrets 配置 **YOUTUBE_API_KEY**（YouTube Data API v3），可选 **YTDLP_COOKIES_B64**。',
              '页面与构建产物会回退历史批次；B 站有货时应已 commit。',
              '详见 docs/CONTENT-OPS.md §9',
              '',
              '<!-- daily-videos-fetch -->',
            ].join('\n');
            try {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 30,
              });
              const existing = issues.find(i => i.title === title);
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                });
              }
            } catch (err) {
              core.warning(`无法创建/更新 Issue（仓库可能关闭了 Issues）: ${err.message}`);
              core.summary.addHeading(title).addRaw(body).write();
            }
