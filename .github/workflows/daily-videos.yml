name: Daily AI Video Update

on:
  schedule:
    # 北京时间每日 00:00（UTC 16:00）
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-videos
  cancel-in-progress: false

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install yt-dlp

      - name: Fetch daily AI videos
        run: python scripts/fetch_daily_videos.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-videos.json
          if git diff --staged --quiet; then
            echo "No video updates today"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI videos $DATE"
          git push
