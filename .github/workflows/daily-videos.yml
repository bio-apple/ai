name: Daily AI Video Update

on:
  schedule:
    # 北京时间每日 00:00（UTC 16:00）
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "强制重抓今日批次（升级六类结构时使用）"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: daily-videos
  cancel-in-progress: false

jobs:
  update-videos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp
        run: pip install yt-dlp pyyaml

      - name: Fetch daily AI videos
        run: |
          FORCE_FLAG=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          python scripts/fetch_daily_videos.py $FORCE_FLAG

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily-videos.json
          if git diff --staged --quiet; then
            echo "No video updates today"
            exit 0
          fi
          DATE=$(TZ=Asia/Shanghai date +%Y-%m-%d)
          git commit -m "chore: daily AI videos $DATE"
          git push
