# AI 课程资源（scripts/fetch_ai_courses.py）
# 产品定义：仅收录「必推荐」核心课；斯坦福课用 Stanford Online 最新学年 YouTube 播放列表

max_age_days: 180
max_items: 16
min_items: 5
free_only: true
required_only: true

# 学习路线（展示与筛选顺序）
track_order:
  - 入门
  - 机器学习
  - 深度学习
  - LLM 大模型
  - AI Agent

# 必推荐：仅微软、谷歌 + YouTube 斯坦福课
required:
  - id: microsoft-genai-beginners
    title: Generative AI for Beginners（微软官方 AI 入门）
    url: https://microsoft.github.io/generative-ai-for-beginners/
    repo: microsoft/generative-ai-for-beginners
    platform: Microsoft
    track: 入门
    format: 开源课程
    summary: 微软官方 Generative AI 入门课，覆盖提示词、RAG、Agent 等基础实践。
    language: en
  - id: google-ml-crash-course
    title: Google Machine Learning Crash Course
    url: https://developers.google.com/machine-learning/crash-course
    platform: Google
    track: 机器学习
    format: 官方课程
    summary: Google 官方机器学习速成课，从基础概念到实践练习。
    language: en
  - id: stanford-cs231n
    title: CS231n Deep Learning for Computer Vision（斯坦福 · Spring 2025）
    url: https://www.youtube.com/playlist?list=PLoROMvodv4rOmsNzYBMe0gJY2XS8AQg16
    official_url: https://cs231n.stanford.edu/
    platform: Stanford
    track: 深度学习
    format: YouTube 公开课
    summary: 斯坦福 CS231n 最新学年（Spring 2025）完整讲座播放列表，计算机视觉深度学习。
    language: en
    year: 2025
  - id: stanford-cs224n
    title: CS224n NLP with Deep Learning（斯坦福 · Spring 2024）
    url: https://www.youtube.com/playlist?list=PLoROMvodv4rOaMFbaqxPDoLWjDaRAdP9D
    official_url: https://web.stanford.edu/class/cs224n/
    platform: Stanford
    track: LLM 大模型
    format: YouTube 公开课
    summary: 斯坦福 CS224n 最新已公开学年（Spring 2024）讲座播放列表；NLP / Transformer 基础。
    language: en
    year: 2024
  - id: stanford-cs336
    title: CS336 Language Modeling from Scratch（斯坦福 · Spring 2026）
    url: https://www.youtube.com/playlist?list=PLoROMvodv4rMqXOcazWaTUHhq-yembLCV
    official_url: https://cs336.stanford.edu/
    platform: Stanford
    track: LLM 大模型
    format: YouTube 公开课
    summary: 斯坦福 CS336 最新学年（Spring 2026）讲座播放列表；从零构建语言模型。
    language: en
    year: 2026

# 无合集入口（已去掉 DeepLearning.AI / Coursera）
hubs: []

dedupe:
  prefer_hub_over_children: true
  max_per_track: 5
  max_per_platform_per_track: 2
  title_jaccard: 0.5
  youtube_ai_pattern: "(ai|artificial intelligence|machine learning|deep learning|llm|gpt|neural|transformer|pytorch|agent|langchain|rag|prompt|diffusion|reinforcement|computer vision|nlp|大模型|人工智能|机器学习|深度学习)"

# 以下补充源全部关闭：课程区仅展示上方必推荐
deeplearning_ai:
  enabled: false
  source: DeepLearning.AI
  url: https://www.deeplearning.ai/short-courses/
  base_url: https://www.deeplearning.ai/courses/
  free: true

coursera:
  enabled: false
  source: Coursera
  base_url: https://www.coursera.org
  free_only: true
  queries: []
  max_per_query: 0
  sort: NEW

huggingface_learn:
  enabled: false
  source: Hugging Face
  hub: https://huggingface.co/learn
  courses: []

youtube_courses:
  enabled: false
  title_pattern: "(full course|complete course|crash course|bootcamp|课程|完整教程|从零|入门到)"
  channels: []

track_keywords:
  AI Agent: "(agent|agentic|mcp|tool use|多智能体|computer use|deploy|inference|mlops|llmops|production|vllm|sglang|ops|部署|评测|observability|serving)"
  LLM 大模型: "(llm|language model|gpt|claude|gemini|prompt|rag|retrieval|transformer|token|推理|工程)"
  深度学习: "(deep learning|cnn|neural|diffusion|pytorch|jax|强化学习|reinforcement|vision|audio)"
  机器学习: "(machine learning|supervised|regression|classification|scikit|特征)"
  入门: "(beginner|everyone|intro|入门|基础|crash course|for beginners|python for)"
