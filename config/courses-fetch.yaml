# AI 课程资源（scripts/fetch_ai_courses.py）
# 产品定义：免费课程，按学习路线编排；必收录核心课 + 近半年补充课；周更

max_age_days: 180
max_items: 80
min_items: 8
free_only: true

# 学习路线（展示与筛选顺序）
track_order:
  - 入门
  - 机器学习
  - 深度学习
  - LLM 大模型
  - AI Agent
  - AI 工程实践

# 必收录（不受半年窗口限制；始终写入）
# 说明：吴恩达系列以 ML + Deep Learning Specialization 为代表；
# DeepLearning.AI 短课程合集不与单课同时进列表（见 dedupe.hubs）
required:
  - id: microsoft-genai-beginners
    title: Generative AI for Beginners（微软官方 AI 入门）
    url: https://microsoft.github.io/generative-ai-for-beginners/
    repo: microsoft/generative-ai-for-beginners
    platform: Microsoft
    track: 入门
    format: 开源课程
    summary: 微软官方 Generative AI 入门课，覆盖提示词、RAG、Agent 等基础实践。
    language: en
  - id: google-ml-crash-course
    title: Google Machine Learning Crash Course
    url: https://developers.google.com/machine-learning/crash-course
    platform: Google
    track: 机器学习
    format: 官方课程
    summary: Google 官方机器学习速成课，从基础概念到实践练习。
    language: en
  - id: andrew-ng-machine-learning
    title: Machine Learning（吴恩达 · DeepLearning.AI）
    url: https://www.coursera.org/learn/machine-learning
    platform: DeepLearning.AI
    track: 机器学习
    format: MOOC
    summary: 吴恩达经典机器学习入门课，建立监督学习与模型评估基础。
    language: en
  - id: andrew-ng-deep-learning
    title: Deep Learning Specialization（吴恩达 · DeepLearning.AI）
    url: https://www.coursera.org/specializations/deep-learning
    platform: DeepLearning.AI
    track: 深度学习
    format: MOOC
    summary: 吴恩达深度学习专项：神经网络、CNN、序列模型与项目实践。
    language: en
  - id: stanford-cs231n
    title: CS231n Deep Learning for Computer Vision（斯坦福）
    url: https://cs231n.stanford.edu/
    platform: Stanford
    track: 深度学习
    format: 大学公开课
    summary: 斯坦福计算机视觉深度学习神课，CNN 与视觉表征经典路线。
    language: en
  - id: stanford-cs224n
    title: CS224n NLP with Deep Learning（斯坦福）
    url: https://web.stanford.edu/class/cs224n/
    platform: Stanford
    track: LLM 大模型
    format: 大学公开课
    summary: 斯坦福 NLP / 深度学习公开课，Transformer 与语言模型基础。
    language: en
  - id: stanford-cs336
    title: CS336 Language Modeling from Scratch（斯坦福）
    url: https://cs336.stanford.edu/
    platform: Stanford
    track: LLM 大模型
    format: 大学公开课
    summary: 斯坦福从零构建语言模型课程，覆盖数据、架构、训练与推理。
    language: en

# 合集入口：只作外链说明，不与下属单课同时出现在 items
hubs:
  - id: deeplearning-ai-hub
    title: DeepLearning.AI 短课程系列（吴恩达团队）
    url: https://www.deeplearning.ai/short-courses/
    child_url_prefix: https://www.deeplearning.ai/courses/
    platform: DeepLearning.AI
    track: LLM 大模型
    format: 短课程合集
    summary: DeepLearning.AI 短课程合集入口（RAG / Agent / 推理等）；不与下属单课重复罗列。

dedupe:
  # 合集已收录时，不再收录其下属单课（避免合集+清单重复）
  prefer_hub_over_children: true
  # 同一平台同一路线最多保留的非必收录条数
  max_per_platform_per_track: 2
  # 同路线标题词重叠过高视为近重复
  title_jaccard: 0.5
  youtube_ai_pattern: "(ai|artificial intelligence|machine learning|deep learning|llm|gpt|neural|transformer|pytorch|agent|langchain|rag|prompt|diffusion|reinforcement|computer vision|nlp|大模型|人工智能|机器学习|深度学习)"

deeplearning_ai:
  # 合集优先时关闭单课抓取，避免与 hubs 重复
  enabled: false
  source: DeepLearning.AI
  url: https://www.deeplearning.ai/short-courses/
  base_url: https://www.deeplearning.ai/courses/
  free: true

coursera:
  enabled: true
  source: Coursera
  base_url: https://www.coursera.org
  free_only: true
  queries:
    - artificial intelligence
    - generative ai
    - large language models
    - machine learning free
    - prompt engineering
  max_per_query: 12
  sort: NEW

huggingface_learn:
  enabled: true
  source: Hugging Face
  hub: https://huggingface.co/learn
  courses:
    - id: agents-course
      name: AI Agents Course
      url: https://huggingface.co/learn/agents-course
      repo: huggingface/agents-course
      track: AI Agent
    - id: llm-course
      name: LLM Course
      url: https://huggingface.co/learn/llm-course
      repo: huggingface/course
      track: LLM 大模型
    - id: smol-course
      name: Smol Course
      url: https://huggingface.co/learn/smol-course
      repo: huggingface/smol-course
      track: LLM 大模型
    - id: diffusion-course
      name: Diffusion Course
      url: https://huggingface.co/learn/diffusion-course
      repo: huggingface/diffusion-models-class
      track: 深度学习
    - id: deep-rl-course
      name: Deep RL Course
      url: https://huggingface.co/learn/deep-rl-course
      repo: huggingface/deep-rl-class
      track: 机器学习
    - id: audio-course
      name: Audio Course
      url: https://huggingface.co/learn/audio-course
      repo: huggingface/audio-transformers-course
      track: 深度学习
    - id: computer-vision-course
      name: Computer Vision Course
      url: https://huggingface.co/learn/computer-vision-course
      repo: huggingface/computer-vision-course
      track: 深度学习

youtube_courses:
  enabled: true
  title_pattern: "(full course|complete course|crash course|bootcamp|课程|完整教程|从零|入门到)"
  channels:
    - name: freeCodeCamp.org
      channel_id: UC8butISFwT-Wl7EV0hUK0BQ
      source: freeCodeCamp
    - name: Sentdex
      channel_id: UCfzlCWGWYyIQ0aLC5w48gBQ
      source: Sentdex
      optional: true

# 自动抓取条目 → 路线映射（按优先级匹配；工程实践须在 LLM 之前）
track_keywords:
  AI Agent: "(agent|agentic|mcp|tool use|多智能体|computer use)"
  AI 工程实践: "(deploy|inference|mlops|llmops|production|vllm|sglang|ops|工程|部署|评测|observability|serving)"
  LLM 大模型: "(llm|language model|gpt|claude|gemini|prompt|rag|retrieval|transformer|token|推理)"
  深度学习: "(deep learning|cnn|neural|diffusion|pytorch|jax|强化学习|reinforcement|vision|audio)"
  机器学习: "(machine learning|supervised|regression|classification|scikit|特征)"
  入门: "(beginner|everyone|intro|入门|基础|crash course|for beginners|python for)"
