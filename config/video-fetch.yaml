# 每日视频抓取配置（scripts/fetch_daily_videos.py 读取）

# YouTube / B站 分别抓取：近 30 天内播放量 Top 10，最低播放 ≥10 万
# 内容门槛：仅保留 AI 关键词匹配
# 各类结果按播放量从高到低排序
video_categories:
  youtube_recent_30d:
    label: "YouTube：近 30 天播放量 Top 10"
    platform: youtube
    days: 30
    top_count: 10
    min_views: 100000
  bilibili_recent_30d:
    label: "B站：近 30 天播放量 Top 10"
    platform: bilibili
    days: 30
    top_count: 10
    min_views: 100000

# 多平台搜索源（分类未写 min_views 时的回退值）
search_sources:
  youtube:
    enabled: true
    label: YouTube
    search_prefix: ytsearch
    min_views: 0
    recent_min_views: 0
  bilibili:
    enabled: true
    label: B站
    min_views: 0
    recent_min_views: 0

search_per_query: 20
# B站/YouTube 每个关键词翻页数（热门排序下 30 天内高播放常不在首页）
search_pages: 5
max_detail_checks: 640

search_queries:
  - "ChatGPT tutorial 2026"
  - "Claude AI tutorial"
  - "Cursor AI editor tutorial"
  - "Gemini AI tutorial"
  - "DeepSeek AI tutorial"
  - "GitHub Copilot tutorial"
  - "OpenAI Codex tutorial"
  - "AI prompt engineering tutorial"

bilibili_search_queries:
  - "ChatGPT 教程"
  - "Claude 教程"
  - "Cursor 编程 教程"
  - "DeepSeek 教程"
  - "Kimi AI 教程"
  - "通义千问 教程"
  - "豆包 AI 教程"
  - "GitHub Copilot 教程"
  - "AI 提示词 教程"
  - "大模型 应用 教程"

ai_keyword_pattern: "(ai|chatgpt|claude|gemini|deepseek|cursor|copilot|codex|kimi|qwen|通义|豆包|prompt|llm|gpt|openai|anthropic|大模型|人工智能|智能体|agent|bilibili|哔哩)"

summary:
  min_length: 24
  max_length: 130
  strip_patterns:
    - "(?i)get\\s+chatgpt[^\\n]{0,120}"
    - "(?i)sponsored[^\\n]*"
    - "(?i)use\\s+code[^\\n]*"
    - "(?i)discount[^\\n]*"
    - "(?i)bit\\.ly/\\S+"
    - "(?i)link\\s+in\\s+(bio|description)[^\\n]*"
