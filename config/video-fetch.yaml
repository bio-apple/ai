# 每日视频抓取配置（scripts/fetch_daily_videos.py 读取）

# 两类推荐（可重叠）：全网播放量 Top10 + 过去一周上新播放量 Top10
video_categories:
  top_views:
    label: "全网播放量 Top 10"
    all_time: true
    top_count: 10
  recent_7d:
    label: "过去一周上新 Top 10"
    days: 7
    top_count: 10

# 多平台搜索源
search_sources:
  youtube:
    enabled: true
    label: YouTube
    search_prefix: ytsearch
    recent_search_prefix: ytsearchdate
    min_height: 1080
    min_views: 8000
    recent_min_views: 500
    min_subscribers: 1000
  bilibili:
    enabled: true
    label: B站
    search_prefix: bilisearch
    min_height: 720
    min_views: 500
    recent_min_views: 200
    min_subscribers: 0

search_per_query: 20
max_detail_checks: 240

search_queries:
  - "ChatGPT tutorial 2026"
  - "Claude AI tutorial"
  - "Cursor AI editor tutorial"
  - "Gemini AI tutorial"
  - "DeepSeek AI tutorial"
  - "GitHub Copilot tutorial"
  - "OpenAI Codex tutorial"
  - "AI prompt engineering tutorial"

bilibili_search_queries:
  - "ChatGPT 教程"
  - "Claude 教程"
  - "Cursor 编程 教程"
  - "DeepSeek 教程"
  - "Kimi AI 教程"
  - "通义千问 教程"
  - "豆包 AI 教程"
  - "GitHub Copilot 教程"
  - "AI 提示词 教程"
  - "大模型 应用 教程"

ai_keyword_pattern: "(ai|chatgpt|claude|gemini|deepseek|cursor|copilot|codex|kimi|qwen|通义|豆包|prompt|llm|gpt|openai|anthropic|大模型|人工智能|智能体|agent|bilibili|哔哩)"

summary:
  min_length: 24
  max_length: 130
  strip_patterns:
    - "(?i)get\\s+chatgpt[^\\n]{0,120}"
    - "(?i)sponsored[^\\n]*"
    - "(?i)use\\s+code[^\\n]*"
    - "(?i)discount[^\\n]*"
    - "(?i)bit\\.ly/\\S+"
    - "(?i)link\\s+in\\s+(bio|description)[^\\n]*"
